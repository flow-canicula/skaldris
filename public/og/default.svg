<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b0b0d"/>
  <!-- Screentone dots -->
  <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
    <circle cx="6" cy="6" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Brand name -->
  <text x="80" y="320" font-family="sans-serif" font-size="120" font-weight="bold" fill="#efece3" letter-spacing="-2">JESUKE</text>
  <!-- Tagline -->
  <text x="80" y="390" font-family="monospace" font-size="18" fill="#b9b7b0" letter-spacing="4" opacity="0.6">ANIME · MANGA · INK</text>
  <!-- Hanko accent -->
  <circle cx="1100" cy="315" r="80" stroke="#b23a2e" stroke-width="4" fill="none"/>
  <line x1="1100" y1="255" x2="1100" y2="340" stroke="#b23a2e" stroke-width="6" stroke-linecap="round"/>
  <line x1="1100" y1="340" x2="1075" y2="370" stroke="#b23a2e" stroke-width="6" stroke-linecap="round"/>
  <line x1="1070" y1="255" x2="1130" y2="255" stroke="#b23a2e" stroke-width="4" stroke-linecap="round"/>
</svg>
