<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0e18"/>
      <stop offset="100%" stop-color="#111214"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="15%" cy="85%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff0052" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff0052" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal glow top-right -->
    <radialGradient id="glow2" cx="90%" cy="10%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00c68d" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00c68d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="310" fill="#ff0052" opacity="0.9"/>

  <!-- Eyebrow — mono label -->
  <text
    x="104" y="182"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="13"
    font-weight="400"
    fill="#00c68d"
    letter-spacing="4"
    text-anchor="start"
  >TECHNICAL ARCHITECT · PHILIPPINES</text>

  <!-- Name line 1: Jaime -->
  <text
    x="104" y="300"
    font-family="'Fugaz One', 'Arial Black', Impact, sans-serif"
    font-size="110"
    font-weight="400"
    fill="#ffffff"
    letter-spacing="-2"
    text-anchor="start"
  >Jaime</text>

  <!-- Name line 2: Canicula with accent on first letter -->
  <text
    x="104" y="408"
    font-family="'Fugaz One', 'Arial Black', Impact, sans-serif"
    font-size="110"
    font-weight="400"
    fill="#ff0052"
    letter-spacing="-2"
    text-anchor="start"
  >C</text>
  <text
    x="175" y="408"
    font-family="'Fugaz One', 'Arial Black', Impact, sans-serif"
    font-size="110"
    font-weight="400"
    fill="#ffffff"
    letter-spacing="-2"
    text-anchor="start"
  >anicula</text>

  <!-- Handle -->
  <text
    x="104" y="462"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="15"
    font-weight="400"
    fill="rgba(200,204,220,0.5)"
    letter-spacing="2"
    text-anchor="start"
  >"Flow" · MTM</text>

  <!-- Divider line -->
  <line x1="104" y1="485" x2="620" y2="485" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Role / specialization line -->
  <text
    x="104" y="516"
    font-family="'Work Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="rgba(200,204,220,0.6)"
    letter-spacing="0.5"
    text-anchor="start"
  >AWS Certified Solutions Architect · Engineering Leader · Cloud Architecture</text>

  <!-- Domain — bottom right -->
  <text
    x="1120" y="580"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="13"
    font-weight="400"
    fill="rgba(200,204,220,0.35)"
    letter-spacing="2"
    text-anchor="end"
  >flow.skaldris.com</text>

  <!-- Teal cert badge area — right side -->
  <rect x="940" y="200" width="180" height="1" fill="#00c68d" opacity="0.4"/>
  <text
    x="1030" y="230"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11"
    font-weight="400"
    fill="#00c68d"
    letter-spacing="3"
    text-anchor="middle"
    opacity="0.8"
  >6× AWS CERTIFIED</text>
  <text
    x="1030" y="258"
    font-family="'Work Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="rgba(200,204,220,0.45)"
    letter-spacing="0"
    text-anchor="middle"
  >Solutions Architect Pro</text>
  <text
    x="1030" y="278"
    font-family="'Work Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="rgba(200,204,220,0.45)"
    letter-spacing="0"
    text-anchor="middle"
  >Developer · SysOps</text>
  <text
    x="1030" y="298"
    font-family="'Work Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="rgba(200,204,220,0.45)"
    letter-spacing="0"
    text-anchor="middle"
  >AI Practitioner · CCP</text>
  <rect x="940" y="316" width="180" height="1" fill="#00c68d" opacity="0.4"/>

  <!-- Gold tag — PSM II -->
  <text
    x="1030" y="360"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11"
    font-weight="400"
    fill="#ffd400"
    letter-spacing="3"
    text-anchor="middle"
    opacity="0.8"
  >PSM II · PSPO I</text>

  <!-- MTM badge -->
  <text
    x="1030" y="410"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="11"
    font-weight="400"
    fill="#0055da"
    letter-spacing="3"
    text-anchor="middle"
    opacity="0.9"
  >MTM — UP DILIMAN</text>
  <text
    x="1030" y="432"
    font-family="'Work Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="12"
    font-weight="400"
    fill="rgba(200,204,220,0.4)"
    text-anchor="middle"
  >GPA 4.0 · Parangal</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="620" width="1200" height="10" fill="#ff0052" opacity="0.7"/>
  <rect x="0" y="620" width="400" height="10" fill="#ff0052"/>
  <rect x="400" y="620" width="400" height="10" fill="#00c68d"/>
  <rect x="800" y="620" width="400" height="10" fill="#0055da"/>
</svg>
